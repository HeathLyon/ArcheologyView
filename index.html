<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Archaeology Archive</title>

    <link rel="stylesheet" href="styles.css">

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>

<div id="sidebar">

    <h1>Archaeology Archive</h1>

    <label>Artifact Scan</label>

    <select id="artifactSelect">
        <option value="example.glb">Example Artifact</option>
        <option value="artifact2.glb">Artifact 2</option>
        <option value="artifact3.glb">Artifact 3</option>
    </select>

    <hr>

    <h2 id="artifactName">Example Artifact</h2>

    <p><strong>Classification:</strong></p>
    <p id="artifactClass">Unknown Structure</p>

    <p><strong>Location:</strong></p>
    <p id="artifactLocation">Excavation Site Alpha</p>

    <p><strong>Notes:</strong></p>
    <p id="artifactNotes">
        Preliminary scans suggest artificial construction.
    </p>

</div>

<div id="viewer">
    <canvas id="c"></canvas>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
